<section class="contacto-section">
  <div class="contacto-container">
    <h2>Contáctanos</h2>
    <p>Si tienes una solicitud o deseas más información, completa el siguiente formulario.</p>

    <form (ngSubmit)="enviarFormulario()" #formContacto="ngForm">
      <div class="form-group">
        <label for="nombre">Nombre completo</label>
        <input
          type="text"
          id="nombre"
          name="nombre"
          [(ngModel)]="formData.nombre"
          required
          placeholder="Tu nombre"
        />
      </div>

      <div class="form-group">
        <label for="correo">Correo electrónico</label>
        <input
          type="email"
          id="correo"
          name="correo"
          [(ngModel)]="formData.correo"
          required
          placeholder="ejemplo@correo.com"
        />
      </div>

      <div class="form-group">
        <label for="tipo">Tipo de solicitud</label>
        <select
          id="tipo"
          name="tipo"
          [(ngModel)]="formData.tipo"
          required
        >
          <option value="" disabled selected>Selecciona una opción</option>
          <option value="reclamacion_salud">Reclamación Salud</option>
          <option value="reclamacion_muerte">Reclamación Muerte</option>
        </select>
      </div>

      <div class="form-group">
        <label for="mensaje">Mensaje</label>
        <textarea
          id="mensaje"
          name="mensaje"
          [(ngModel)]="formData.mensaje"
          required
          placeholder="Escribe tu mensaje aquí..."
          rows="5"
        ></textarea>
      </div>

      <button type="submit" [disabled]="!formContacto.valid">
        Enviar mensaje
      </button>
    </form>
  </div>
</section>
